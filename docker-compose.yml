services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-hackathon}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hackathon}']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama-glm-ocr:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
      pid=$$!;
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull glm-ocr;
      wait $$pid"
    volumes:
      - ollama_glm_ocr_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q '^glm-ocr'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  ollama-qwen-chat:
    image: ollama/ollama:0.17.6
    entrypoint: ["/bin/sh", "-c"]
    ports:
      - '11434:11434'
    command: >
      "ollama serve &
      pid=$$!;
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull \"$${CHAT_LLM_MODEL}\";
      wait $$pid"
    environment:
      CHAT_LLM_MODEL: ${CHAT_LLM_MODEL:-qwen3.5:4b}
      OLLAMA_FLASH_ATTENTION: "0"
      GGML_CPU_REPACK: "0"
    volumes:
      - ollama_qwen_chat_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama show \"$${CHAT_LLM_MODEL}\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  embedding-minilm:
    build: ./model-services/text-model
    environment:
      MODEL_TASK: embedding
      MODEL_NAME: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - embedding_minilm_data:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  reranker-polish-roberta:
    build: ./model-services/text-model
    environment:
      MODEL_TASK: reranker
      MODEL_NAME: ${RERANKER_MODEL:-sdadas/polish-reranker-roberta-v3}
      MODEL_MAX_LENGTH: 8192
    volumes:
      - reranker_polish_roberta_data:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-hackathon}
      DEBUG: ${DEBUG:-false}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL:-}
      MODEL_SERVICE_API_KEY: ${MODEL_SERVICE_API_KEY:-}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-ollama}
      CHAT_LLM_BASE_URL: ${CHAT_LLM_BASE_URL:-http://ollama-qwen-chat:11434}
      CHAT_LLM_MODEL: ${CHAT_LLM_MODEL:-qwen3.5:4b}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-bip_lublin_chunks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding-minilm:8080}
      RERANKER_MODEL: ${RERANKER_MODEL:-sdadas/polish-reranker-roberta-v3}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_CANDIDATE_MULTIPLIER: ${RERANKER_CANDIDATE_MULTIPLIER:-4}
      RERANKER_SERVICE_URL: ${RERANKER_SERVICE_URL:-http://reranker-polish-roberta:8080}
      VISION_LLM_PROVIDER: ${VISION_LLM_PROVIDER:-ollama}
      VISION_LLM_BASE_URL: ${VISION_LLM_BASE_URL:-http://ollama-glm-ocr:11434}
      VISION_LLM_API_KEY: ${VISION_LLM_API_KEY:-}
      VISION_LLM_MODEL: ${VISION_LLM_MODEL:-glm-ocr}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://10.8.47.10","http://10.8.47.10:3000","http://localhost:3000","http://localhost:5173"]}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama-glm-ocr:
        condition: service_healthy
      ollama-qwen-chat:
        condition: service_healthy
      embedding-minilm:
        condition: service_healthy
      reranker-polish-roberta:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is inlined at build time and read by the browser, so it
        # must point at the host-reachable backend URL (the server's LAN IP).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://10.8.47.10:8000}
    ports:
      - '3000:3000'
    depends_on:
      - backend

  jupyter:
    build: ./notebooks
    ports:
      - '8888:8888'
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-hackathon}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-hackathon}
    depends_on:
      postgres:
        condition: service_healthy

  pipeline:
    build: ./pipeline
    volumes:
      - ./pipeline:/app
      - ./data:/data
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-hackathon}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - pipeline

volumes:
  postgres_data:
  qdrant_data:
  ollama_glm_ocr_data:
  ollama_qwen_chat_data:
  embedding_minilm_data:
  reranker_polish_roberta_data:
